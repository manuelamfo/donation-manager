name: Pipeline de CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-and-coverage:
    name: Teste em ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.12"]
        node-version: ["24"]

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configura Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Instala dependências do Python
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
        shell: bash

      - name: Roda testes do backend com coverage
        run: |
          pytest backend/ --cov=backend --cov-report=xml
        shell: bash

      - name: Upload coverage no codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          file: ./coverage.xml
          flags: backend
          fail_ci_if_error: true

      - name: Configura Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Instala dependências do frontend
        run: |
          cd frontend
          npm ci
        shell: bash

      - name: Roda testes do frontend
        run: |
          cd frontend
          npm test -- --run || echo "Nenhum teste configurado no frontend ainda."
        shell: bash
        
      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
